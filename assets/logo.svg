<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Gradient from green to blue-purple left to right -->
    <linearGradient id="mainGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#4ACC80"/>
      <stop offset="25%" stop-color="#38C4A0"/>
      <stop offset="65%" stop-color="#4888CC"/>
      <stop offset="100%" stop-color="#5A58CC"/>
    </linearGradient>

    <!-- Green for left satellite -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5CC462"/>
      <stop offset="100%" stop-color="#4AB855"/>
    </linearGradient>

    <!-- Blue-purple for top satellite -->
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7080DC"/>
      <stop offset="100%" stop-color="#5050C8"/>
    </linearGradient>

    <!-- Blue-purple for bottom satellite -->
    <linearGradient id="botGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4858D0"/>
      <stop offset="100%" stop-color="#3838B4"/>
    </linearGradient>
  </defs>

  <!-- MAIN RING SYMBOL: 4 large circles creating organic shape -->
  <circle cx="55" cy="100" r="38" fill="url(#mainGrad)" opacity="0.95"/>
  <circle cx="100" cy="55" r="38" fill="url(#mainGrad)" opacity="0.95"/>
  <circle cx="145" cy="100" r="38" fill="url(#mainGrad)" opacity="0.95"/>
  <circle cx="100" cy="145" r="38" fill="url(#mainGrad)" opacity="0.95"/>

  <!-- White center circle (creates the "ring" effect) -->
  <circle cx="100" cy="100" r="28" fill="white"/>

  <!-- SATELLITE CIRCLES -->
  <!-- Left: bright green -->
  <circle cx="15" cy="100" r="22" fill="url(#greenGrad)"/>

  <!-- Top: blue-purple -->
  <circle cx="100" cy="15" r="20" fill="url(#topGrad)"/>

  <!-- Bottom: larger blue-purple -->
  <circle cx="100" cy="185" r="24" fill="url(#botGrad)"/>
</svg>
