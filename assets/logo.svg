<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 570 190">
  <defs>
    <!-- Ring arm gradients -->
    <linearGradient id="la" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ACC88"/>
      <stop offset="100%" stop-color="#32C0A8"/>
    </linearGradient>
    <linearGradient id="ta" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#32C0A8"/>
      <stop offset="100%" stop-color="#6070D0"/>
    </linearGradient>
    <linearGradient id="ra" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A88CC"/>
      <stop offset="100%" stop-color="#5A58CC"/>
    </linearGradient>
    <linearGradient id="ba" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5060CC"/>
      <stop offset="100%" stop-color="#4040B8"/>
    </linearGradient>
    <!-- Satellite gradients -->
    <linearGradient id="ts" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7080DC"/>
      <stop offset="100%" stop-color="#5050C8"/>
    </linearGradient>
    <linearGradient id="bs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4858D0"/>
      <stop offset="100%" stop-color="#3838B4"/>
    </linearGradient>
  </defs>

  <!-- Ring body: 4 overlapping arm circles -->
  <circle cx="57" cy="92" r="35" fill="url(#la)"/>
  <circle cx="92" cy="57" r="35" fill="url(#ta)"/>
  <circle cx="127" cy="92" r="35" fill="url(#ra)"/>
  <circle cx="92" cy="127" r="35" fill="url(#ba)"/>

  <!-- White center hole -->
  <circle cx="92" cy="92" r="27" fill="white"/>

  <!-- Left satellite: bright green -->
  <circle cx="20" cy="92" r="20" fill="#5CC462"/>

  <!-- Top satellite: blue-purple -->
  <circle cx="92" cy="20" r="18" fill="url(#ts)"/>

  <!-- Bottom satellite: larger blue-purple -->
  <circle cx="92" cy="164" r="22" fill="url(#bs)"/>

  <!-- Text: megatons -->
  <text
    x="183" y="118"
    font-family="'Arial Rounded MT Bold','Trebuchet MS',Arial,sans-serif"
    font-size="78" font-weight="900"
    fill="#1A7DC8" letter-spacing="-1"
  >megatons</text>

  <!-- Text: saúde -->
  <text
    x="558" y="160"
    font-family="'Arial Rounded MT Bold','Trebuchet MS',Arial,sans-serif"
    font-size="41" font-weight="700"
    fill="#2A98CC" text-anchor="end"
  >saúde</text>
</svg>
