<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 195">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&amp;display=swap');
    </style>

    <!-- Gradient cross horizontal: teal-left to blue-purple-right -->
    <linearGradient id="hGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#42C9A8"/>
      <stop offset="40%"  stop-color="#38A8CC"/>
      <stop offset="70%"  stop-color="#4080CC"/>
      <stop offset="100%" stop-color="#5555D2"/>
    </linearGradient>

    <!-- Gradient cross vertical: blue-top to blue-purple-bottom -->
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#6B80DA"/>
      <stop offset="50%"  stop-color="#4488CC"/>
      <stop offset="100%" stop-color="#4A4AD0"/>
    </linearGradient>

    <!-- Top node -->
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7A8EE0"/>
      <stop offset="100%" stop-color="#5050C8"/>
    </linearGradient>

    <!-- Bottom node -->
    <linearGradient id="botGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#5868D8"/>
      <stop offset="100%" stop-color="#3A3ABE"/>
    </linearGradient>
  </defs>

  <!-- ======== SYMBOL (fits ~0–180 x, 0–190 y) ======== -->

  <!-- Cross: horizontal arm -->
  <rect x="18" y="72" width="148" height="46" rx="23" fill="url(#hGrad)"/>

  <!-- Cross: vertical arm -->
  <rect x="72" y="14" width="46" height="162" rx="23" fill="url(#vGrad)"/>

  <!-- White center hole -->
  <circle cx="95" cy="95" r="26" fill="white"/>

  <!-- Left node – green -->
  <circle cx="20" cy="95" r="20" fill="#5CC462"/>

  <!-- Top node – blue-purple -->
  <circle cx="95" cy="16" r="18" fill="url(#topGrad)"/>

  <!-- Bottom node – blue-purple (larger) -->
  <circle cx="95" cy="174" r="22" fill="url(#botGrad)"/>

  <!-- ======== TEXT ======== -->

  <!-- "megatons" -->
  <text
    x="195" y="122"
    font-family="'Nunito', 'Arial Rounded MT Bold', 'Helvetica Neue', Arial, sans-serif"
    font-size="82"
    font-weight="900"
    fill="#1A7DC8"
    letter-spacing="-1"
  >megatons</text>

  <!-- "saúde" right-aligned with end of "megatons" -->
  <text
    x="573" y="165"
    font-family="'Nunito', 'Arial Rounded MT Bold', 'Helvetica Neue', Arial, sans-serif"
    font-size="44"
    font-weight="700"
    fill="#2A98CC"
    text-anchor="end"
  >saúde</text>
</svg>
